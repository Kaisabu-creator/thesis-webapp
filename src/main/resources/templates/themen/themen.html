<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thema</title>
    <link href="/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-primary-subtle">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Thesis is coming!</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
                aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/betreuende">Betreuende</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/themen">Themen</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/matching">Matching</a>
                </li>
            </ul>
            <div th:if="${navButton}" th:object="${navButton}">
                <a class="btn btn-primary" th:href="*{url}" th:text="*{label}">Anmelden</a>
            </div>
        </div>
    </div>
</nav>
<div class="row justify-content-center">
    <div class="col-md-4 text-center mb-4">
        <h1 class="display-4 fw-bold">Verfügbare Themen</h1>
    </div>
</div>
<table class="table">
    <thead>
    <tr>
        <th>Titel</th>
        <th>Betreuer</th>
        <th style="max-width: 400px;">Beschreibung</th>
    </tr>
    </thead>
    <tr th:each="thema: ${themenListe}">
        <td><a th:href="@{/thema/{id}(id=${thema.id})}" th:text="${thema.titel}"></a></td>
        <td><a th:href="@{/betreuende/{id}(id=${thema.profilID})}" th:text="'Link zum Betreuer'"></a></td>
        <td style="max-width: 400px; word-wrap: break-word; white-space: normal;" th:text="${thema.beschreibung}"></td>
    </tr>
</table>
</body>
</html>
